# XcodeGen spec for the example app. Run `xcodegen generate` in this folder, then open
# MeldDemo.xcodeproj. Depends on the MeldSDK package at the repo root (local path).
name: MeldDemo
options:
  bundleIdPrefix: io.meld.demo
  deploymentTarget:
    iOS: "16.0"
packages:
  MeldSDK:
    path: ".."
targets:
  MeldDemo:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: MeldSDK
        product: MeldSDK
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.meld.demo.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        # Apple Pay entitlement. ON enables the Apple Pay sheet on the Simulator (frontend/event
        # preview with the fake merchant id; the Simulator token can't be processed server-side).
        # NOTE: on a free Personal Team this breaks *device* signing ("…do not support the Apple Pay
        # capability") — that error is cosmetic for Simulator-only runs. Comment this out to sign
        # device builds on a Personal Team. Regenerate with `xcodegen generate` after changing.
        CODE_SIGN_ENTITLEMENTS: MeldDemo.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
