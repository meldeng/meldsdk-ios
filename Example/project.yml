# XcodeGen spec for the example app. Run `xcodegen generate` in this folder, then open
# MeldDemo.xcodeproj. Depends on the MeldSDK package at the repo root (local path).
name: MeldDemo
options:
  bundleIdPrefix: io.meld.demo
  deploymentTarget:
    iOS: "16.0"
packages:
  MeldSDK:
    path: ".."
targets:
  MeldDemo:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: MeldSDK
        product: MeldSDK
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.meld.demo.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
