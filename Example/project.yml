# XcodeGen spec for the example app. Run `xcodegen generate` in this folder, then open
# MeldDemo.xcodeproj. Depends on the MeldSDK package at the repo root (local path).
name: MeldDemo
options:
  bundleIdPrefix: io.meld.demo
  deploymentTarget:
    iOS: "16.0"
packages:
  MeldSDK:
    path: ".."
targets:
  MeldDemo:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: MeldSDK
        product: MeldSDK
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.meld.demo.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        # Apple Pay is OFF by default so the demo signs/runs on a free Personal Team (which can't
        # use the Apple Pay capability). To exercise the Apple Pay sheet, you need a paid Apple
        # Developer account: uncomment the line below (MeldDemo.entitlements holds the merchant id),
        # enable the Apple Pay capability for your team, and regenerate with `xcodegen generate`.
        # CODE_SIGN_ENTITLEMENTS: MeldDemo.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
